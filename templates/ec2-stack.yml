AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Free Tier with Security Group and User Data

Parameters:

  InstanceType:
    Type: String
    Default: t2.micro

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName

Resources:

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access from anywhere

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:

      ImageId: ami-0c02fb55956c7d316
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName

      SecurityGroupIds:
        - !Ref EC2SecurityGroup

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash

          yum update -y

          yum install -y httpd

          systemctl start httpd
          systemctl enable httpd

          cat <<EOF > /var/www/html/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>Bienvenido</title>
          </head>
          <body>
              <h1>Bienvenido a AWS CloudFormation</h1>
              <p>Instancia creada mediante Infrastructure as Code.</p>
              <p>Desplegada desde GitHub Actions.</p>
          </body>
          </html>
          EOF

      Tags:
        - Key: Name
          Value: FreeTierEC2

Outputs:

  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  PublicIP:
    Description: Public IP Address
    Value: !GetAtt EC2Instance.PublicIp

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref EC2SecurityGroup